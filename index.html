<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- TODO to put zomato logo icon  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Zomato Clone</title>
  </head>
  <body>
    <section class="hero__Section">
      <header>
        <nav class="navbar">
          <a href="#">Get the App</a>
          <div class="navbar_menu_container">
            <a href="#" class="link">Inventor Relations</a>
            <a href="#" class="link">Add Restaurants</a>
            <a href="#" class="link">Login</a>
            <a href="#" class="link">SignUp</a>
            <a href="#" class="user__icon">
              <i class="fa-solid fa-user"></i>
            </a>
          </div>
        </nav>
      </header>

      <div class="hero_section_container">
        <img
          src="images/heroSectionLogo.png"
          alt="Zomato logo"
          class="hero_section_logo"
        />
        <h1 class="hero_section_title">
          Discover the best Food & drinks in Hampi-Hospet
        </h1>
        <div class="hero__section_input_container">
          <input
            type="text"
            placeholder="Hampi-Hospet"
            class="input_container_location"
          />
          <input
            type="search"
            placeholder="search for a Restaurant, cuisine or a dish"
            class="input_container_search"
          />
        </div>
      </div>
    </section>
  </body>
</html>
